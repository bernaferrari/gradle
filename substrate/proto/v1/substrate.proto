syntax = "proto3";

package gradle.substrate.v1;

// -- Control Service --

service ControlService {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message HandshakeRequest {
  string client_version = 1;
  string protocol_version = 2;
  int32 client_pid = 3;
}

message HandshakeResponse {
  bool accepted = 1;
  string server_version = 2;
  string protocol_version = 3;
  string error_message = 4;
}

message ShutdownRequest {
  bool force = 1;
}

message ShutdownResponse {
  bool acknowledged = 1;
}

// -- Hash Service --

service HashService {
  rpc HashBatch(HashBatchRequest) returns (HashBatchResponse);
}

message FileToHash {
  string absolute_path = 1;
  int64 length = 2;
  int64 last_modified = 3;
}

message HashResult {
  string absolute_path = 1;
  bytes hash_bytes = 2;
  bool error = 3;
  string error_message = 4;
}

message HashBatchRequest {
  repeated FileToHash files = 1;
  string algorithm = 2;
}

message HashBatchResponse {
  repeated HashResult results = 1;
}

// -- Cache Service --

service CacheService {
  rpc LoadEntry(CacheLoadRequest) returns (stream CacheLoadChunk);
  rpc StoreEntry(stream CacheStoreChunk) returns (CacheStoreResponse);
}

message CacheLoadRequest {
  bytes key = 1;
}

message CacheLoadChunk {
  oneof payload {
    CacheEntryMetadata metadata = 1;
    bytes data = 2;
  }
}

message CacheEntryMetadata {
  int64 size = 1;
  string content_type = 2;
}

message CacheStoreChunk {
  oneof payload {
    CacheStoreInit init = 1;
    bytes data = 2;
  }
}

message CacheStoreInit {
  bytes key = 1;
  int64 total_size = 2;
}

message CacheStoreResponse {
  bool success = 1;
  string error_message = 2;
}

// -- Exec Service --

service ExecService {
  rpc Spawn(ExecSpawnRequest) returns (ExecSpawnResponse);
  rpc Wait(ExecWaitRequest) returns (ExecWaitResponse);
  rpc Signal(ExecSignalRequest) returns (ExecSignalResponse);
  rpc KillTree(ExecKillTreeRequest) returns (ExecKillTreeResponse);
  rpc SubscribeOutput(ExecOutputRequest) returns (stream ExecOutputChunk);
}

message ExecSpawnRequest {
  string command = 1;
  repeated string args = 2;
  map<string, string> environment = 3;
  string working_dir = 4;
  bool redirect_error_stream = 5;
}

message ExecSpawnResponse {
  int32 pid = 1;
  bool success = 2;
  string error_message = 3;
}

message ExecWaitRequest {
  int32 pid = 1;
}

message ExecWaitResponse {
  int32 exit_code = 1;
  string error_message = 2;
}

message ExecSignalRequest {
  int32 pid = 1;
  int32 signal = 2;
}

message ExecSignalResponse {
  bool success = 1;
  string error_message = 2;
}

message ExecKillTreeRequest {
  int32 pid = 1;
}

message ExecKillTreeResponse {
  bool success = 1;
  string error_message = 2;
}

message ExecOutputRequest {
  int32 pid = 1;
}

message ExecOutputChunk {
  bytes data = 1;
  bool is_stderr = 2;
}

// -- Work Service (advisory only) --

service WorkService {
  rpc Evaluate(WorkEvaluateRequest) returns (WorkEvaluateResponse);
  rpc RecordExecution(WorkRecordRequest) returns (WorkRecordResponse);
}

message WorkEvaluateRequest {
  string task_path = 1;
  map<string, string> input_properties = 2;
}

message WorkEvaluateResponse {
  bool should_execute = 1;
  string reason = 2;
}

message WorkRecordRequest {
  string task_path = 1;
  int64 duration_ms = 2;
  bool success = 3;
}

message WorkRecordResponse {
  bool acknowledged = 1;
}

// -- Execution Plan Service --

// Provides advisory and authoritative execution planning.
// Phase 5 (advisory): Rust predicts the outcome, Java remains authoritative.
// Phase 6 (authoritative): Rust drives work identity, caching, and up-to-date decisions.
service ExecutionPlanService {
  // Phase 5: Predict execution outcome without side effects.
  rpc PredictOutcome(PredictOutcomeRequest) returns (PredictOutcomeResponse);

  // Phase 6: Resolve the execution plan authoritatively.
  rpc ResolvePlan(ResolvePlanRequest) returns (ResolvePlanResponse);

  // Record the actual outcome after execution (for shadow mode comparison).
  rpc RecordOutcome(RecordOutcomeRequest) returns (RecordOutcomeResponse);
}

// Metadata about a unit of work sent from the JVM.
message WorkMetadata {
  // Unique identity string for the work unit.
  string work_identity = 1;
  // Display name (e.g. task path).
  string display_name = 2;
  // Implementation class name.
  string implementation_class = 3;
  // All scalar input properties (name -> serialized value snapshot).
  map<string, string> input_properties = 4;
  // All input file fingerprints (name -> fingerprint hash).
  map<string, string> input_file_fingerprints = 5;
  // Whether caching is enabled for this work.
  bool caching_enabled = 6;
  // Whether loading from cache is allowed.
  bool can_load_from_cache = 7;
  // Whether the work has previous execution state.
  bool has_previous_execution_state = 8;
  // Rebuild reasons if the work needs re-execution.
  repeated string rebuild_reasons = 9;
}

enum PredictedOutcome {
  PREDICTED_UNKNOWN = 0;
  PREDICTED_EXECUTE = 1;
  PREDICTED_UP_TO_DATE = 2;
  PREDICTED_FROM_CACHE = 3;
  PREDICTED_SHORT_CIRCUITED = 4;
}

message PredictOutcomeRequest {
  WorkMetadata work = 1;
}

message PredictOutcomeResponse {
  PredictedOutcome predicted_outcome = 1;
  string reasoning = 2;
  // Confidence score 0.0-1.0 for the prediction.
  float confidence = 3;
}

// Authoritative plan resolution for Phase 6.
enum PlanAction {
  PLAN_ACTION_UNKNOWN = 0;
  PLAN_ACTION_EXECUTE = 1;
  PLAN_ACTION_SKIP_UP_TO_DATE = 2;
  PLAN_ACTION_LOAD_FROM_CACHE = 3;
  PLAN_ACTION_SHORT_CIRCUIT = 4;
}

message ResolvePlanRequest {
  WorkMetadata work = 1;
  // Mode: advisory (shadow) or authoritative.
  bool authoritative = 2;
}

message ResolvePlanResponse {
  PlanAction action = 1;
  string reasoning = 2;
  // Cache key to use if action is LOAD_FROM_CACHE.
  string cache_key_hint = 3;
}

message RecordOutcomeRequest {
  string work_identity = 1;
  PredictedOutcome predicted_outcome = 2;
  string actual_outcome = 3;
  bool prediction_correct = 4;
  int64 duration_ms = 5;
}

message RecordOutcomeResponse {
  bool acknowledged = 1;
}

// -- Execution History Service (Phase 7) --

// Stores and retrieves execution history for up-to-date checking.
// Replaces Java's ExecutionHistoryStore with Rust-backed storage.
service ExecutionHistoryService {
  // Load previous execution state for a work unit.
  rpc LoadHistory(LoadHistoryRequest) returns (LoadHistoryResponse);
  // Store execution state after execution completes.
  rpc StoreHistory(StoreHistoryRequest) returns (StoreHistoryResponse);
  // Remove execution history for a work unit.
  rpc RemoveHistory(RemoveHistoryRequest) returns (RemoveHistoryResponse);
}

message LoadHistoryRequest {
  string work_identity = 1;
}

message LoadHistoryResponse {
  bool found = 1;
  // Serialized execution state (input fingerprints, output snapshots, etc.).
  bytes state = 2;
  // Timestamp of when this state was stored.
  int64 timestamp_ms = 3;
}

message StoreHistoryRequest {
  string work_identity = 1;
  // Serialized execution state.
  bytes state = 2;
  int64 timestamp_ms = 3;
}

message StoreHistoryResponse {
  bool success = 1;
}

message RemoveHistoryRequest {
  string work_identity = 1;
}

message RemoveHistoryResponse {
  bool success = 1;
}

// -- File Fingerprint Service (Phase 9) --

// Walks file trees and computes content hashes in Rust.
// Replaces Java's FileCollectionFingerprinter.
service FileFingerprintService {
  // Fingerprint a set of files/directories.
  rpc FingerprintFiles(FingerprintFilesRequest) returns (FingerprintFilesResponse);
}

message FileToFingerprint {
  string absolute_path = 1;
  // How to handle this entry: FILE, DIRECTORY, or ROOT.
  FingerprintType type = 2;
}

enum FingerprintType {
  FINGERPRINT_FILE = 0;
  FINGERPRINT_DIRECTORY = 1;
  FINGERPRINT_ROOT = 2;
}

message FingerprintFilesRequest {
  repeated FileToFingerprint files = 1;
  // Normalization strategy: ABSOLUTE_PATH, RELATIVE_PATH, NAME_ONLY, HASH.
  string normalization_strategy = 2;
  // Ignore changes to this pattern (e.g. ".DS_Store").
  repeated string ignore_patterns = 3;
}

message FileFingerprintEntry {
  string path = 1;
  bytes hash = 2;
  int64 size = 3;
  int64 last_modified = 4;
  bool is_directory = 5;
}

message FingerprintFilesResponse {
  // Fingerprinted entries.
  repeated FileFingerprintEntry entries = 1;
  // Overall hash of the entire file collection.
  bytes collection_hash = 2;
  // Error message if fingerprinting failed.
  string error_message = 3;
  bool success = 4;
}

// -- Value Snapshot Service (Phase 10) --

// Computes fingerprints for input properties in Rust.
// Replaces Java's DefaultValueSnapshotter.
service ValueSnapshotService {
  // Fingerprint a batch of input properties.
  rpc SnapshotValues(SnapshotValuesRequest) returns (SnapshotValuesResponse);
}

message PropertyValue {
  string name = 1;
  // Serialized value representation.
  oneof value {
    string string_value = 2;
    int64 long_value = 3;
    bool bool_value = 4;
    bytes binary_value = 5;
    // For collection types, a semicolon-separated list.
    string list_value = 6;
    // For map types, key=value pairs separated by newlines.
    string map_value = 7;
  }
  // Type name for the value (e.g. "java.lang.String", "java.io.File").
  string type_name = 8;
}

message SnapshotValuesRequest {
  repeated PropertyValue values = 1;
  // Implementation fingerprint for the work unit.
  string implementation_fingerprint = 2;
}

message ValueSnapshotResult {
  string name = 1;
  bytes fingerprint = 2;
}

message SnapshotValuesResponse {
  repeated ValueSnapshotResult results = 1;
  // Composite hash of all input values.
  bytes composite_hash = 2;
  // Error message if snapshotting failed.
  string error_message = 3;
  bool success = 4;
}

// -- Build Cache Orchestration Service (Phase 8) --

// Coordinates build cache operations from Rust.
// Replaces Java's BuildCacheController with Rust-backed orchestration.
service BuildCacheOrchestrationService {
  // Compute a cache key for the given work identity and input fingerprints.
  rpc ComputeCacheKey(ComputeCacheKeyRequest) returns (ComputeCacheKeyResponse);
  // Check if a cache entry exists without loading it.
  rpc ProbeCache(ProbeCacheRequest) returns (ProbeCacheResponse);
  // Pack execution outputs into a cache entry (delegates to existing CacheService).
  rpc StoreOutputs(StoreOutputsRequest) returns (StoreOutputsResponse);
}

message ComputeCacheKeyRequest {
  string work_identity = 1;
  string implementation_hash = 2;
  map<string, string> input_property_hashes = 3;
  map<string, string> input_file_hashes = 4;
  repeated string output_property_names = 5;
}

message ComputeCacheKeyResponse {
  bytes cache_key = 1;
  string cache_key_string = 2;
}

message ProbeCacheRequest {
  bytes cache_key = 1;
}

message ProbeCacheResponse {
  bool available = 1;
  string location = 2; // "local", "remote", or "both"
}

message StoreOutputsRequest {
  bytes cache_key = 1;
  int64 execution_time_ms = 2;
}

message StoreOutputsResponse {
  bool success = 1;
  string error_message = 2;
}

// -- Task Graph Service (Phase 11) --

// Manages task dependency resolution and execution scheduling.
// Replaces Java's DefaultTaskExecutionGraph core logic.
service TaskGraphService {
  // Register a task with its dependencies.
  rpc RegisterTask(RegisterTaskRequest) returns (RegisterTaskResponse);
  // Resolve the full execution plan (topological sort, parallel scheduling).
  rpc ResolveExecutionPlan(ResolveExecutionPlanRequest) returns (ResolveExecutionPlanResponse);
  // Notify that a task has started executing.
  rpc TaskStarted(TaskStartedRequest) returns (TaskStartedResponse);
  // Notify that a task has finished executing.
  rpc TaskFinished(TaskFinishedRequest) returns (TaskFinishedResponse);
  // Get the current execution progress.
  rpc GetProgress(GetProgressRequest) returns (GetProgressResponse);
}

message RegisterTaskRequest {
  string task_path = 1;
  repeated string depends_on = 2;
  bool should_execute = 3;
  string task_type = 4; // e.g. "org.gradle.api.Task"
}

message RegisterTaskResponse {
  bool success = 1;
}

message ResolveExecutionPlanRequest {
  string build_id = 1;
}

message ExecutionNode {
  string task_path = 1;
  repeated string dependencies = 2;
  int64 execution_order = 3;
  // Estimated duration in ms (from history, 0 if unknown).
  int64 estimated_duration_ms = 4;
}

message ResolveExecutionPlanResponse {
  repeated ExecutionNode execution_order = 1;
  int32 total_tasks = 2;
  int32 ready_to_execute = 3;
  // Estimated critical path duration in ms.
  int64 critical_path_ms = 4;
  bool has_cycles = 5;
}

message TaskStartedRequest {
  string task_path = 1;
  int64 start_time_ms = 2;
}

message TaskStartedResponse {
  bool acknowledged = 1;
}

message TaskFinishedRequest {
  string task_path = 1;
  int64 duration_ms = 2;
  bool success = 3;
  string outcome = 4; // "EXECUTED", "UP_TO_DATE", "FROM_CACHE", "FAILED"
}

message TaskFinishedResponse {
  bool acknowledged = 1;
}

message GetProgressRequest {}

message TaskProgress {
  string task_path = 1;
  string status = 2; // "PENDING", "EXECUTING", "SUCCEEDED", "FAILED", "SKIPPED", "UP_TO_DATE", "FROM_CACHE"
  int64 duration_ms = 3;
}

message GetProgressResponse {
  repeated TaskProgress tasks = 1;
  int32 completed = 2;
  int32 total = 3;
  int32 executing = 4;
  int64 elapsed_ms = 5;
}

// -- Configuration Service (Phase 12) --

// Manages project configuration and property resolution.
// Offloads configuration evaluation from the JVM.
service ConfigurationService {
  // Register a project and its properties.
  rpc RegisterProject(RegisterProjectRequest) returns (RegisterProjectResponse);
  // Resolve a project property value.
  rpc ResolveProperty(ResolvePropertyRequest) returns (ResolvePropertyResponse);
  // Cache resolved configuration state.
  rpc CacheConfiguration(CacheConfigurationRequest) returns (CacheConfigurationResponse);
  // Check if configuration cache is valid.
  rpc ValidateConfigCache(ValidateConfigCacheRequest) returns (ValidateConfigCacheResponse);
}

message RegisterProjectRequest {
  string project_path = 1;
  string project_dir = 2;
  map<string, string> properties = 3;
  repeated string applied_plugins = 4;
}

message RegisterProjectResponse {
  bool success = 1;
}

message ResolvePropertyRequest {
  string project_path = 1;
  string property_name = 2;
  string requested_by = 3; // Which task or plugin is requesting
}

message ResolvePropertyResponse {
  string value = 1;
  string source = 2; // "gradle.properties", "system", "project", "default"
  bool found = 3;
}

message CacheConfigurationRequest {
  string project_path = 1;
  bytes config_hash = 2;
  int64 timestamp_ms = 3;
}

message CacheConfigurationResponse {
  bool cached = 1;
  bool hit = 2;
}

message ValidateConfigCacheRequest {
  string project_path = 1;
  bytes expected_hash = 2;
  repeated string input_files = 3;
  repeated string build_script_hashes = 4;
}

message ValidateConfigCacheResponse {
  bool valid = 1;
  string reason = 2;
}

// -- Plugin Service (Phase 13) --

// Manages plugin resolution and application.
// Replaces PluginManager core logic.
service PluginService {
  // Register an available plugin.
  rpc RegisterPlugin(RegisterPluginRequest) returns (RegisterPluginResponse);
  // Request a plugin to be applied.
  rpc ApplyPlugin(ApplyPluginRequest) returns (ApplyPluginResponse);
  // Check if a plugin is already applied.
  rpc HasPlugin(HasPluginRequest) returns (HasPluginResponse);
  // Get all applied plugins for a project.
  rpc GetAppliedPlugins(GetAppliedPluginsRequest) returns (GetAppliedPluginsResponse);
}

message RegisterPluginRequest {
  string plugin_id = 1;
  string plugin_class = 2;
  string version = 3;
  bool is_imperative = 4; // true = plugins {}, false = plugins id
  repeated string applies_to = 5; // Which project types this plugin targets
}

message RegisterPluginResponse {
  bool success = 1;
}

message ApplyPluginRequest {
  string plugin_id = 1;
  string project_path = 2;
  int64 apply_order = 3;
}

message ApplyPluginResponse {
  bool success = 1;
  string error_message = 2;
}

message HasPluginRequest {
  string plugin_id = 1;
  string project_path = 2;
}

message HasPluginResponse {
  bool has_plugin = 1;
}

message GetAppliedPluginsRequest {
  string project_path = 1;
}

message GetAppliedPluginsResponse {
  repeated PluginInfo plugins = 1;
}

message PluginInfo {
  string plugin_id = 1;
  string plugin_class = 2;
  string version = 3;
  int64 applied_at_ms = 4;
  int32 apply_order = 5;
}

// -- Build Operations Service (Phase 14) --

// Streams build events and manages build lifecycle.
// Replaces BuildOperationRunner.
service BuildOperationsService {
  // Start a build operation.
  rpc StartOperation(StartOperationRequest) returns (StartOperationResponse);
  // Complete a build operation.
  rpc CompleteOperation(CompleteOperationRequest) returns (CompleteOperationResponse);
  // Report progress for an operation.
  rpc ReportProgress(ReportProgressRequest) returns (ReportProgressResponse);
  // Stream build lifecycle events (server-streaming).
  rpc StreamEvents(StreamEventsRequest) returns (stream BuildEvent);
  // Get build summary at completion.
  rpc GetBuildSummary(GetBuildSummaryRequest) returns (GetBuildSummaryResponse);
}

message StartOperationRequest {
  string operation_id = 1;
  string display_name = 2;
  string operation_type = 3;
  string parent_id = 4; // Empty for root operations
  int64 start_time_ms = 5;
  map<string, string> metadata = 6;
}

message StartOperationResponse {
  bool success = 1;
}

message CompleteOperationRequest {
  string operation_id = 1;
  int64 duration_ms = 2;
  bool success = 3;
  string outcome = 4;
}

message CompleteOperationResponse {
  bool success = 1;
}

message ReportProgressRequest {
  string operation_id = 1;
  string message = 2;
  float progress = 3; // 0.0 - 1.0
  int64 elapsed_ms = 4;
}

message ReportProgressResponse {
  bool acknowledged = 1;
}

message StreamEventsRequest {
  string build_id = 1;
}

message BuildEvent {
  int64 timestamp_ms = 1;
  string event_type = 2; // "START", "PROGRESS", "FINISH", "FAILURE"
  string operation_id = 3;
  string display_name = 4;
  string message = 5;
  float progress = 6;
  bool success = 7;
}

message GetBuildSummaryRequest {}

message BuildSummary {
  string build_id = 1;
  int64 total_duration_ms = 2;
  int32 total_tasks = 3;
  int32 executed_tasks = 4;
  int32 up_to_date_tasks = 5;
  int32 from_cache_tasks = 6;
  int32 failed_tasks = 7;
  string outcome = 8; // "SUCCESS", "FAILURE"
}

message GetBuildSummaryResponse {
  BuildSummary summary = 1;
}

// -- Bootstrap Service (Phase 15) --

// Coordinates Gradle initialization and provides the final JVM-Rust handoff.
service BootstrapService {
  // Initialize a build session.
  rpc InitBuild(InitBuildRequest) returns (InitBuildResponse);
  // Notify build completion.
  rpc CompleteBuild(CompleteBuildRequest) returns (CompleteBuildResponse);
  // Get the substrate daemon health and version info.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  // Get a summary of what the substrate is handling.
  rpc GetSubstrateInfo(GetSubstrateInfoRequest) returns (GetSubstrateInfoResponse);
}

message InitBuildRequest {
  string build_id = 1;
  string project_dir = 2;
  int64 start_time_ms = 3;
  int32 requested_parallelism = 4;
  map<string, string> system_properties = 5;
  repeated string requested_features = 6;
}

message InitBuildResponse {
  string build_id = 1;
  string substrate_version = 2;
  string protocol_version = 3;
  int32 max_parallelism = 4;
}

message CompleteBuildRequest {
  string build_id = 1;
  string outcome = 2;
  int64 duration_ms = 3;
}

message CompleteBuildResponse {
  bool acknowledged = 1;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  string uptime = 3;
  int64 active_builds = 4;
}

message GetSubstrateInfoRequest {}

message SubstrateServiceInfo {
  string service_name = 1;
  string status = 2; // "active", "shadow", "disabled"
  int64 requests_served = 3;
}

message GetSubstrateInfoResponse {
  string daemon_version = 1;
  repeated SubstrateServiceInfo services = 2;
  int64 total_requests = 3;
}

// -- Dependency Resolution Service (Phase 18) --

// Resolves dependency graphs and manages artifact downloads.
service DependencyResolutionService {
  // Resolve a dependency graph.
  rpc ResolveDependencies(ResolveDependenciesRequest) returns (ResolveDependenciesResponse);
  // Check if an artifact is in the local cache.
  rpc CheckArtifactCache(CheckArtifactCacheRequest) returns (CheckArtifactCacheResponse);
  // Download an artifact.
  rpc DownloadArtifact(DownloadArtifactRequest) returns (stream DownloadArtifactChunk);
  // Report resolution result for tracking.
  rpc RecordResolution(RecordResolutionRequest) returns (RecordResolutionResponse);
}

message DependencyDescriptor {
  string group = 1;
  string name = 2;
  string version = 3;
  string classifier = 4; // e.g. "sources", "javadoc"
  string extension = 5;  // e.g. "jar", "aar", "pom"
  bool transitive = 6;
}

message RepositoryDescriptor {
  string id = 1;
  string url = 2;
  bool m2compatible = 3;
  bool allow_insecure_protocol = 4;
  map<string, string> credentials = 5;
}

message ResolveDependenciesRequest {
  string configuration_name = 1;
  repeated DependencyDescriptor dependencies = 2;
  repeated RepositoryDescriptor repositories = 3;
  repeated string attributes = 4;
  bool lenient = 5;
}

message ResolvedDependency {
  string group = 1;
  string name = 2;
  string version = 3;
  string selected_version = 4; // after conflict resolution
  repeated ResolvedDependency dependencies = 5;
  bool resolved = 6;
  string failure_reason = 7;
  string artifact_url = 8;
  int64 artifact_size = 9;
  string artifact_sha256 = 10;
}

message ResolveDependenciesResponse {
  bool success = 1;
  repeated ResolvedDependency resolved_dependencies = 2;
  string error_message = 3;
  int64 resolution_time_ms = 4;
  int32 total_artifacts = 5;
  int64 total_download_size = 6;
}

message CheckArtifactCacheRequest {
  string group = 1;
  string name = 2;
  string version = 3;
  string classifier = 4;
  string extension = 5;
  string sha256 = 6;
}

message CheckArtifactCacheResponse {
  bool cached = 1;
  string local_path = 2;
  int64 cached_size = 3;
}

message DownloadArtifactRequest {
  string url = 1;
  string group = 2;
  string name = 3;
  string version = 4;
  string classifier = 5;
  string extension = 6;
  repeated RepositoryDescriptor repositories = 7;
}

message DownloadArtifactChunk {
  bytes data = 1;
  int64 offset = 2;
  int64 total_size = 3;
  bool is_last = 4;
  string error_message = 5;
}

message RecordResolutionRequest {
  string configuration_name = 1;
  int32 dependency_count = 2;
  int64 resolution_time_ms = 3;
  bool success = 4;
  int64 cache_hits = 5;
}

message RecordResolutionResponse {
  bool acknowledged = 1;
}

// -- File System Watch Service (Phase 19) --

// Watches file system changes for incremental builds.
service FileWatchService {
  // Start watching a directory tree.
  rpc StartWatching(StartWatchingRequest) returns (StartWatchingResponse);
  // Stop watching a directory tree.
  rpc StopWatching(StopWatchingRequest) returns (StopWatchingResponse);
  // Poll for changes since last poll (server-streaming).
  rpc PollChanges(PollChangesRequest) returns (stream FileChangeEvent);
  // Get watch statistics.
  rpc GetWatchStats(GetWatchStatsRequest) returns (GetWatchStatsResponse);
}

message StartWatchingRequest {
  string root_path = 1;
  repeated string include_patterns = 2;
  repeated string exclude_patterns = 3;
}

message StartWatchingResponse {
  bool watching = 1;
  string watch_id = 2;
  int64 files_watched = 3;
}

message StopWatchingRequest {
  string watch_id = 1;
}

message StopWatchingResponse {
  bool stopped = 1;
}

message PollChangesRequest {
  string watch_id = 1;
  int64 since_timestamp_ms = 2;
}

message FileChangeEvent {
  string path = 1;
  string change_type = 2; // CREATED, MODIFIED, DELETED
  int64 timestamp_ms = 3;
  int64 file_size = 4;
  bool is_directory = 5;
}

message GetWatchStatsRequest {
  string watch_id = 1;
}

message GetWatchStatsResponse {
  int64 files_watched = 1;
  int64 changes_detected = 2;
  int64 last_poll_time_ms = 3;
  int64 watch_start_time_ms = 4;
}

// -- Configuration Cache Service (Phase 20) --

// Stores and retrieves serialized build configuration.
service ConfigurationCacheService {
  // Store a configuration cache entry.
  rpc StoreConfigCache(StoreConfigCacheRequest) returns (StoreConfigCacheResponse);
  // Load a configuration cache entry.
  rpc LoadConfigCache(LoadConfigCacheRequest) returns (LoadConfigCacheResponse);
  // Validate a configuration cache entry.
  rpc ValidateConfig(ValidateConfigRequest) returns (ValidateConfigResponse);
  // Clean stale cache entries.
  rpc CleanConfigCache(CleanConfigCacheRequest) returns (CleanConfigCacheResponse);
}

message StoreConfigCacheRequest {
  string cache_key = 1;
  bytes serialized_config = 2;
  int64 entry_count = 3;
  repeated string input_hashes = 4;
  int64 timestamp_ms = 5;
}

message StoreConfigCacheResponse {
  bool stored = 1;
  int64 storage_time_ms = 2;
}

message LoadConfigCacheRequest {
  string cache_key = 1;
}

message LoadConfigCacheResponse {
  bool found = 2;
  bytes serialized_config = 3;
  int64 entry_count = 4;
  int64 timestamp_ms = 5;
}

message ValidateConfigRequest {
  string cache_key = 1;
  repeated string input_hashes = 2;
}

message ValidateConfigResponse {
  bool valid = 1;
  string reason = 2;
}

message CleanConfigCacheRequest {
  int64 max_age_ms = 1;
  int32 max_entries = 2;
}

message CleanConfigCacheResponse {
  int32 entries_removed = 1;
  int64 space_recovered_bytes = 2;
}

// -- Toolchain Management Service (Phase 23) --

// Downloads, verifies, and manages JDK/toolchain distributions.
service ToolchainService {
  // Get available toolchain installations.
  rpc ListToolchains(ListToolchainsRequest) returns (ListToolchainsResponse);
  // Ensure a toolchain is available (download if missing).
  rpc EnsureToolchain(EnsureToolchainRequest) returns (stream ToolchainProgress);
  // Verify a toolchain installation (hash check).
  rpc VerifyToolchain(VerifyToolchainRequest) returns (VerifyToolchainResponse);
  // Get the current Java home for a given toolchain spec.
  rpc GetJavaHome(GetJavaHomeRequest) returns (GetJavaHomeResponse);
}

message ToolchainDescriptor {
  string language_version = 1; // e.g. "17", "21", "22"
  string implementation = 2;   // "jbr", "temurin", "corretto", "graalvm"
  string vendor = 3;           // e.g. "jetbrains", "eclipse"
  string os = 4;               // "linux", "macos", "windows"
  string arch = 5;             // "x86_64", "aarch64"
}

message ListToolchainsRequest {
  string os = 1;
  string arch = 2;
}

message ToolchainLocation {
  string language_version = 1;
  string implementation = 2;
  string java_home = 3;
  bool verified = 4;
  int64 install_size_bytes = 5;
  string installed_via = 6; // "auto", "manual", "sdkman"
}

message ListToolchainsResponse {
  repeated ToolchainLocation toolchains = 1;
}

message EnsureToolchainRequest {
  string language_version = 1;
  string implementation = 2; // preferred implementation
  string vendor = 3;
  string os = 4;
  string arch = 5;
  repeated string download_urls = 6; // fallback URLs in order
}

message ToolchainProgress {
  string phase = 1;          // "checking", "downloading", "extracting", "verifying", "done", "error"
  int64 progress_percent = 2;
  string message = 3;
  bool success = 4;
  string error_message = 5;
  string java_home = 6;     // set when done
}

message VerifyToolchainRequest {
  string java_home = 1;
  string expected_version = 2;
}

message VerifyToolchainResponse {
  bool valid = 1;
  string detected_version = 2;
  string error_message = 3;
}

message GetJavaHomeRequest {
  string language_version = 1;
  string implementation = 2;
}

message GetJavaHomeResponse {
  string java_home = 1;
  bool found = 2;
}

// -- Build Event Streaming Service (Phase 24) --

// Streams build lifecycle events to IDEs and CI systems.
service BuildEventStreamService {
  // Subscribe to build events for a build session.
  rpc SubscribeBuildEvents(SubscribeBuildEventsRequest) returns (stream BuildEventMessage);
  // Send a build event from the JVM.
  rpc SendBuildEvent(SendBuildEventRequest) returns (SendBuildEventResponse);
  // Get the build event log.
  rpc GetEventLog(GetEventLogRequest) returns (GetEventLogResponse);
}

message SubscribeBuildEventsRequest {
  string build_id = 1;
  repeated string event_types = 2; // filter: "task_start", "task_finish", "progress", "build_finish"
}

message BuildEventMessage {
  string build_id = 1;
  int64 timestamp_ms = 2;
  string event_type = 3;       // "build_start", "task_start", "task_progress", "task_finish", "build_finish"
  string event_id = 4;
  map<string, string> properties = 5;
  string display_name = 6;
  string parent_id = 7;
}

message SendBuildEventRequest {
  string build_id = 1;
  string event_type = 2;
  string event_id = 3;
  map<string, string> properties = 4;
  string display_name = 5;
  string parent_id = 6;
}

message SendBuildEventResponse {
  bool accepted = 1;
}

message GetEventLogRequest {
  string build_id = 1;
  int64 since_timestamp_ms = 2;
  int32 max_events = 3;
}

message GetEventLogResponse {
  repeated BuildEventMessage events = 1;
  int32 total_events = 2;
}

// -- Worker Process Management Service (Phase 25) --

// Manages Gradle worker daemon processes (compiler daemons, test workers).
// Replaces Gradle's WorkerDaemon infrastructure with a more efficient
// Rust-based process pool.
service WorkerProcessService {
  // Acquire a worker process from the pool (or spawn a new one).
  rpc AcquireWorker(AcquireWorkerRequest) returns (AcquireWorkerResponse);
  // Release a worker back to the pool.
  rpc ReleaseWorker(ReleaseWorkerRequest) returns (ReleaseWorkerResponse);
  // Stop a specific worker process.
  rpc StopWorker(StopWorkerRequest) returns (StopWorkerResponse);
  // Get status of all worker processes.
  rpc GetWorkerStatus(GetWorkerStatusRequest) returns (GetWorkerStatusResponse);
  // Configure the worker pool (max size, idle timeout, etc.).
  rpc ConfigurePool(ConfigurePoolRequest) returns (ConfigurePoolResponse);
}

message WorkerSpec {
  string worker_key = 1;        // unique key identifying the worker type (e.g. "java-compiler", "test-worker")
  string java_home = 2;         // JDK to use
  repeated string classpath = 3; // worker classpath entries
  string working_dir = 4;       // working directory for the worker
  map<string, string> jvm_args = 5; // JVM arguments (e.g. "-Xmx512m")
  int32 max_memory_mb = 6;      // max heap size in MB
  bool daemon = 7;              // whether to keep the process alive between uses
}

message WorkerHandle {
  string worker_id = 1;         // unique worker instance ID
  string worker_key = 2;        // type of worker
  int32 pid = 3;                // OS process ID
  string connect_address = 4;   // address for IPC (socket/pipe)
  int64 started_at_ms = 5;      // when the worker was started
  bool healthy = 6;             // health check result
}

message AcquireWorkerRequest {
  WorkerSpec spec = 1;
  int64 timeout_ms = 2;         // max time to wait for a worker
}

message AcquireWorkerResponse {
  WorkerHandle worker = 1;
  bool reused = 2;              // true if reusing an existing idle worker
  string error_message = 3;     // set if acquisition failed
}

message ReleaseWorkerRequest {
  string worker_id = 1;
  bool healthy = 2;             // whether the worker is still healthy (for pool reuse decisions)
}

message ReleaseWorkerResponse {
  bool accepted = 1;
}

message StopWorkerRequest {
  string worker_id = 1;
  bool force = 2;               // SIGKILL vs graceful shutdown
}

message StopWorkerResponse {
  bool stopped = 1;
  string error_message = 2;
}

message GetWorkerStatusRequest {
  string worker_key = 1;        // optional: filter by worker type
}

message WorkerStatus {
  string worker_id = 1;
  string worker_key = 2;
  int32 pid = 3;
  string state = 4;             // "idle", "busy", "starting", "stopping"
  int64 started_at_ms = 5;
  int64 last_used_ms = 6;
  int64 memory_used_bytes = 7;
  int32 tasks_completed = 8;
}

message GetWorkerStatusResponse {
  repeated WorkerStatus workers = 1;
  int32 pool_size = 2;
  int32 idle_count = 3;
  int32 busy_count = 4;
}

message ConfigurePoolRequest {
  int32 max_pool_size = 1;
  int64 idle_timeout_ms = 2;    // how long before idle workers are stopped
  int32 max_per_key = 3;        // max workers per worker type
  bool enable_health_checks = 4;
}

message ConfigurePoolResponse {
  bool applied = 1;
}

// -- Build Layout / Project Model Service (Phase 26) --

// Manages the Gradle project model: multi-project structure,
// settings, and project inclusion. Replaces the JVM-side
// SettingsProcessor and ProjectModel.
service BuildLayoutService {
  // Register the root project and parse settings.
  rpc InitBuildLayout(InitBuildLayoutRequest) returns (InitBuildLayoutResponse);
  // Add a subproject to the model.
  rpc AddSubproject(AddSubprojectRequest) returns (AddSubprojectResponse);
  // Resolve the full project tree.
  rpc GetProjectTree(GetProjectTreeRequest) returns (GetProjectTreeResponse);
  // Get the build file path for a project.
  rpc GetBuildFilePath(GetBuildFilePathRequest) returns (GetBuildFilePathResponse);
  // List all projects in the build.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
}

message InitBuildLayoutRequest {
  string root_dir = 1;          // absolute path to the root project
  string settings_file = 2;     // path to settings.gradle/settings.gradle.kts
  string build_file = 3;        // default build file name ("build.gradle" or "build.gradle.kts")
  string build_name = 4;        // name of the build
}

message InitBuildLayoutResponse {
  string build_id = 1;
  bool initialized = 2;
  string error_message = 3;
}

message AddSubprojectRequest {
  string build_id = 1;
  string project_path = 2;      // Gradle path, e.g. ":app", ":lib:utils"
  string project_dir = 3;       // absolute path to the project directory
  string build_file = 4;        // build file path for this project
  string display_name = 5;      // human-readable name
}

message AddSubprojectResponse {
  bool added = 1;
  string error_message = 2;
}

message ProjectNode {
  string project_path = 1;      // Gradle path, e.g. ":app", ":lib:utils"
  string project_dir = 2;       // absolute directory path
  string build_file = 3;        // build file path
  string display_name = 4;
  repeated string children = 5; // child project paths
}

message GetProjectTreeRequest {
  string build_id = 1;
}

message GetProjectTreeResponse {
  ProjectNode root = 1;
  repeated ProjectNode all_projects = 2;
}

message GetBuildFilePathRequest {
  string build_id = 1;
  string project_path = 2;
}

message GetBuildFilePathResponse {
  string build_file_path = 1;
  bool found = 2;
}

message ListProjectsRequest {
  string build_id = 1;
}

message ListProjectsResponse {
  repeated string project_paths = 1;
  repeated string project_dirs = 2;
}

// -- Build Result Reporting Service (Phase 28) --

// Aggregates build outcomes, task results, and build metadata.
// Replaces Gradle's BuildResult model with a more efficient Rust
// implementation. Provides structured build reports for CI/CD
// integration and build scans.
service BuildResultService {
  // Report a task execution result.
  rpc ReportTaskResult(ReportTaskResultRequest) returns (ReportTaskResultResponse);
  // Report a build failure.
  rpc ReportBuildFailure(ReportBuildFailureRequest) returns (ReportBuildFailureResponse);
  // Get the aggregated build result.
  rpc GetBuildResult(GetBuildResultRequest) returns (GetBuildResultResponse);
  // Get a summary of all tasks in the build.
  rpc GetTaskSummary(GetTaskSummaryRequest) returns (GetTaskSummaryResponse);
}

message TaskResult {
  string task_path = 1;            // e.g. ":app:compileJava"
  string outcome = 2;              // "SUCCESS", "UP_TO_DATE", "FROM_CACHE", "FAILED", "SKIPPED"
  int64 duration_ms = 3;           // execution time
  bool did_work = 4;               // whether the task actually did any work
  string cache_key = 5;            // build cache key (if applicable)
  int64 start_time_ms = 6;
  int64 end_time_ms = 7;
  string failure_message = 8;      // set if outcome == FAILED
  int32 execution_reason = 9;      // 0=incremental, 1=full, 2=no-source
}

message ReportTaskResultRequest {
  string build_id = 1;
  TaskResult result = 2;
}

message ReportTaskResultResponse {
  bool accepted = 1;
}

message ReportBuildFailureRequest {
  string build_id = 1;
  string failure_type = 2;         // "build_failed", "configuration_error", "assertion_error"
  string failure_message = 3;
  repeated string failed_task_paths = 4;
}

message ReportBuildFailureResponse {
  bool accepted = 1;
}

message BuildOutcome {
  string build_id = 1;
  string overall_result = 2;       // "SUCCESS", "FAILED"
  int64 total_duration_ms = 3;
  int32 tasks_total = 4;
  int32 tasks_executed = 5;
  int32 tasks_from_cache = 6;
  int32 tasks_up_to_date = 7;
  int32 tasks_failed = 8;
  int32 tasks_skipped = 9;
}

message GetBuildResultRequest {
  string build_id = 1;
}

message GetBuildResultResponse {
  BuildOutcome outcome = 1;
  repeated TaskResult task_results = 2;
}

message GetTaskSummaryRequest {
  string build_id = 1;
}

message TaskSummaryEntry {
  string task_path = 1;
  string outcome = 2;
  int64 duration_ms = 3;
}

message GetTaskSummaryResponse {
  repeated TaskSummaryEntry tasks = 1;
  int64 total_duration_ms = 2;
}

// -- Problem / Diagnostic Reporting Service (Phase 29) --

// Collects and manages build problems, warnings, and deprecations.
// Replaces Gradle's ProblemReporting infrastructure with a Rust
// implementation that provides structured diagnostics for IDEs
// and CI dashboards.
service ProblemReportingService {
  // Report a problem (warning, error, deprecation, etc.).
  rpc ReportProblem(ReportProblemRequest) returns (ReportProblemResponse);
  // Get all problems for a build.
  rpc GetProblems(GetProblemsRequest) returns (GetProblemsResponse);
  // Get problems by severity.
  rpc GetProblemsBySeverity(GetProblemsBySeverityRequest) returns (GetProblemsResponse);
  // Clear problems for a build.
  rpc ClearProblems(ClearProblemsRequest) returns (ClearProblemsResponse);
}

message ProblemDetails {
  string problem_id = 1;
  string severity = 2;             // "warning", "error", "info", "deprecation"
  string category = 3;             // "deprecated_feature", "property_override", "dependency", "compile", "lint"
  string message = 4;
  string details = 5;              // optional: longer description
  string file_path = 6;            // optional: source file
  int32 line_number = 7;           // optional: line in file
  int32 column = 8;                // optional: column in file
  string contextual_label = 9;     // e.g. "org.gradle.java", "compileKotlin"
  string documentation_url = 10;   // link to docs about the problem
  string additional_data = 11;     // JSON blob for extra info
  int64 timestamp_ms = 12;
}

message ReportProblemRequest {
  string build_id = 1;
  ProblemDetails problem = 2;
}

message ReportProblemResponse {
  bool accepted = 1;
}

message GetProblemsRequest {
  string build_id = 1;
}

message GetProblemsBySeverityRequest {
  string build_id = 1;
  string severity = 2;
}

message GetProblemsResponse {
  repeated ProblemDetails problems = 1;
  int32 total = 2;
  int32 warning_count = 3;
  int32 error_count = 4;
  int32 deprecation_count = 5;
}

message ClearProblemsRequest {
  string build_id = 1;
}

message ClearProblemsResponse {
  int32 cleared = 1;
}

// -- Resource Management Service (Phase 30) --

// Tracks and limits build resources (memory, CPU, file descriptors).
// Replaces Gradle's resource reservation system with a more efficient
// Rust implementation. Provides real-time resource monitoring.
service ResourceManagementService {
  // Reserve resources for a task execution.
  rpc ReserveResources(ReserveResourcesRequest) returns (ReserveResourcesResponse);
  // Release resources after task execution.
  rpc ReleaseResources(ReleaseResourcesRequest) returns (ReleaseResourcesResponse);
  // Get current resource usage.
  rpc GetResourceUsage(GetResourceUsageRequest) returns (GetResourceUsageResponse);
  // Get resource limits configuration.
  rpc GetResourceLimits(GetResourceLimitsRequest) returns (GetResourceLimitsResponse);
  // Update resource limits.
  rpc SetResourceLimits(SetResourceLimitsRequest) returns (SetResourceLimitsResponse);
}

message ResourceRequest {
  string resource_type = 1;       // "memory_mb", "cpu_cores", "file_descriptors", "threads"
  int64 amount = 2;               // requested amount
  string requester_id = 3;        // task or component requesting the resource
}

message ReserveResourcesRequest {
  string build_id = 1;
  repeated ResourceRequest resources = 2;
  int64 timeout_ms = 3;           // max time to wait for resources
}

message ReserveResourcesResponse {
  bool granted = 1;
  string reservation_id = 2;      // unique reservation ID
  string denial_reason = 3;       // why the reservation was denied
}

message ReleaseResourcesRequest {
  string reservation_id = 1;
}

message ReleaseResourcesResponse {
  bool released = 1;
}

message ResourceUsageEntry {
  string resource_type = 1;
  int64 total_capacity = 2;
  int64 used = 3;
  int64 reserved = 4;
  int64 available = 5;
  int32 waiters = 6;              // number of pending reservation requests
}

message GetResourceUsageRequest {
  string build_id = 1;
}

message GetResourceUsageResponse {
  repeated ResourceUsageEntry usage = 1;
  int64 total_memory_bytes = 2;   // system memory
  int64 used_memory_bytes = 3;
  double cpu_usage_percent = 4;
  int32 active_threads = 5;
}

message ResourceLimit {
  string resource_type = 1;
  int64 max_amount = 2;
  int64 soft_limit = 3;           // warning threshold
}

message GetResourceLimitsRequest {
  string build_id = 1;
}

message GetResourceLimitsResponse {
  repeated ResourceLimit limits = 1;
}

message SetResourceLimitsRequest {
  string build_id = 1;
  repeated ResourceLimit limits = 2;
}

message SetResourceLimitsResponse {
  bool applied = 1;
}

// -- Build Comparison Service (Phase 31) --

// Compares two build executions to identify differences in outputs,
// task graph, and execution times. Used for build analysis and
// flaky test detection.
service BuildComparisonService {
  // Start a build comparison.
  rpc StartComparison(StartComparisonRequest) returns (StartComparisonResponse);
  // Record a build's data for comparison.
  rpc RecordBuildData(RecordBuildDataRequest) returns (RecordBuildDataResponse);
  // Get the comparison result.
  rpc GetComparisonResult(GetComparisonResultRequest) returns (GetComparisonResultResponse);
}

message BuildDataSnapshot {
  string build_id = 1;
  int64 start_time_ms = 2;
  int64 end_time_ms = 3;
  map<string, int64> task_durations = 4;   // task_path -> duration_ms
  map<string, string> task_outcomes = 5;   // task_path -> outcome
  repeated string task_order = 6;          // execution order
  string root_dir = 7;
  repeated string input_properties = 8;    // serialized build inputs hash
}

message StartComparisonRequest {
  string baseline_build_id = 1;
  string candidate_build_id = 2;
}

message StartComparisonResponse {
  string comparison_id = 1;
  bool started = 2;
}

message RecordBuildDataRequest {
  BuildDataSnapshot snapshot = 1;
}

message RecordBuildDataResponse {
  bool accepted = 1;
}

message TaskComparison {
  string task_path = 1;
  string baseline_outcome = 2;
  string candidate_outcome = 3;
  int64 baseline_duration_ms = 4;
  int64 candidate_duration_ms = 5;
  int64 duration_diff_ms = 6;
  double duration_ratio = 7;              // candidate/baseline
  bool outcome_changed = 8;
}

message ComparisonSummary {
  string comparison_id = 1;
  string baseline_build_id = 2;
  string candidate_build_id = 3;
  int64 baseline_total_ms = 4;
  int64 candidate_total_ms = 5;
  int64 total_diff_ms = 6;
  int32 tasks_only_in_baseline = 7;
  int32 tasks_only_in_candidate = 8;
  int32 tasks_with_changed_outcome = 9;
  int32 tasks_with_regression = 10;       // slower in candidate
  int32 tasks_with_improvement = 11;      // faster in candidate
}

message GetComparisonResultRequest {
  string comparison_id = 1;
}

message GetComparisonResultResponse {
  ComparisonSummary summary = 1;
  repeated TaskComparison task_comparisons = 2;
}

// -- Console / Rich Output Service (Phase 32) --

// Manages console output, progress rendering, and status lines.
// Provides a unified output interface for the daemon that the JVM
// can use instead of directly writing to stdout/stderr.
service ConsoleService {
  // Log a message at a given level.
  rpc LogMessage(LogMessageRequest) returns (LogMessageResponse);
  // Update a progress bar or status line.
  rpc UpdateProgress(UpdateProgressRequest) returns (UpdateProgressResponse);
  // Request user input (for interactive builds).
  rpc RequestInput(RequestInputRequest) returns (RequestInputResponse);
  // Set the build description (shown in title bar / CI).
  rpc SetBuildDescription(SetBuildDescriptionRequest) returns (SetBuildDescriptionResponse);
}

message LogMessageRequest {
  string build_id = 1;
  string level = 2;               // "lifecycle", "quiet", "warn", "error", "info", "debug"
  string category = 3;            // e.g. "org.gradle.api", "org.gradle.workers"
  string message = 4;
  string throwable = 5;           // optional: stack trace
}

message LogMessageResponse {
  bool accepted = 1;
}

message ProgressOperation {
  string operation_id = 1;
  string description = 2;         // e.g. "Compiling Java sources"
  string status = 3;              // "running", "succeeded", "failed"
  int64 total_work = 4;           // total units of work
  int64 completed_work = 5;       // completed units
  int64 start_time_ms = 6;
  int64 end_time_ms = 7;
  string header = 8;              // e.g. ":compileJava"
}

message UpdateProgressRequest {
  string build_id = 1;
  repeated ProgressOperation operations = 2;
}

message UpdateProgressResponse {
  bool accepted = 1;
}

message RequestInputRequest {
  string build_id = 1;
  string prompt = 2;              // e.g. "Do you want to continue? [y,n]"
  string default_value = 3;
  string input_id = 4;
}

message RequestInputResponse {
  string value = 1;
}

message SetBuildDescriptionRequest {
  string build_id = 1;
  string description = 2;         // e.g. "Building my-app (42 tasks)"
}

message SetBuildDescriptionResponse {
  bool accepted = 1;
}

// -- Test Execution Service (Phase 33) --

// Manages test discovery, execution tracking, and result aggregation.
// Replaces Gradle's TestFramework and TestResultProcessor with a Rust
// implementation that handles test filtering, parallel execution, and
// result persistence more efficiently.
service TestExecutionService {
  // Register a test suite (class/container of tests).
  rpc RegisterTestSuite(RegisterTestSuiteRequest) returns (RegisterTestSuiteResponse);
  // Report a test result (pass/fail/skipped).
  rpc ReportTestResult(ReportTestResultRequest) returns (ReportTestResultResponse);
  // Get the full test report for a build.
  rpc GetTestReport(GetTestReportRequest) returns (GetTestReportResponse);
  // Get test results filtered by outcome.
  rpc GetTestResultsByOutcome(GetTestResultsByOutcomeRequest) returns (GetTestResultsByOutcomeResponse);
  // Get a test execution summary.
  rpc GetTestSummary(GetTestSummaryRequest) returns (TestSummaryResponse);
}

message TestSuiteDescriptor {
  string suite_id = 1;
  string suite_name = 2;            // e.g. "com.example.MyTest"
  string suite_type = 3;            // "junit", "junit5", "spock", "testng"
  int32 test_count = 4;
  string module_path = 5;           // Gradle project path
}

message RegisterTestSuiteRequest {
  string build_id = 1;
  TestSuiteDescriptor suite = 2;
}

message RegisterTestSuiteResponse {
  bool accepted = 1;
}

message TestResultEntry {
  string test_id = 1;               // unique test ID
  string suite_id = 2;
  string test_name = 3;             // e.g. "testSomething"
  string test_class = 4;            // fully qualified class name
  string outcome = 5;               // "PASSED", "FAILED", "SKIPPED", "ABORTED"
  int64 start_time_ms = 6;
  int64 end_time_ms = 7;
  int64 duration_ms = 8;
  string failure_message = 9;
  string failure_type = 10;         // e.g. "AssertionError", "NullPointerException"
  repeated string failure_stack_trace = 11;
  bool rerun = 12;                  // true if this is a rerun of a failed test
  int32 attempt = 13;               // retry attempt number
}

message ReportTestResultRequest {
  string build_id = 1;
  TestResultEntry result = 2;
}

message ReportTestResultResponse {
  bool accepted = 1;
}

message GetTestReportRequest {
  string build_id = 1;
}

message TestSuiteReport {
  TestSuiteDescriptor suite = 1;
  repeated TestResultEntry results = 2;
  int32 passed = 3;
  int32 failed = 4;
  int32 skipped = 5;
  int64 total_duration_ms = 6;
}

message GetTestReportResponse {
  repeated TestSuiteReport suites = 1;
  int32 total_tests = 2;
  int32 total_passed = 3;
  int32 total_failed = 4;
  int32 total_skipped = 5;
  int64 total_duration_ms = 6;
}

message GetTestResultsByOutcomeRequest {
  string build_id = 1;
  string outcome = 2;               // "PASSED", "FAILED", "SKIPPED"
}

message GetTestResultsByOutcomeResponse {
  repeated TestResultEntry results = 1;
  int32 count = 2;
}

message GetTestSummaryRequest {
  string build_id = 1;
}

message TestSummaryResponse {
  int32 suites = 1;
  int32 tests = 2;
  int32 passed = 3;
  int32 failed = 4;
  int32 skipped = 5;
  int32 aborted = 6;
  int64 total_duration_ms = 7;
  repeated string failed_test_names = 8;
  double pass_rate = 9;
}

// -- Artifact Publishing Service (Phase 34) --

// Manages artifact upload to Maven/Ivy repositories.
// Replaces Gradle's PublishMechanism with a more efficient Rust
// implementation that handles artifact signing, checksumming,
// and upload with better parallelism and retry logic.
service ArtifactPublishingService {
  // Register an artifact to be published.
  rpc RegisterArtifact(RegisterArtifactRequest) returns (RegisterArtifactResponse);
  // Record an artifact upload result.
  rpc RecordUploadResult(RecordUploadResultRequest) returns (RecordUploadResultResponse);
  // Get publishing status for a build.
  rpc GetPublishingStatus(GetPublishingStatusRequest) returns (GetPublishingStatusResponse);
  // Get checksums for an artifact.
  rpc GetArtifactChecksums(GetArtifactChecksumsRequest) returns (GetArtifactChecksumsResponse);
}

message ArtifactDescriptor {
  string artifact_id = 1;           // unique ID for this artifact
  string group = 2;                 // e.g. "com.example"
  string name = 3;                  // e.g. "my-lib"
  string version = 4;               // e.g. "1.0.0"
  string classifier = 5;            // e.g. "sources", "javadoc", "" (main)
  string extension = 6;             // e.g. "jar", "aar", "pom"
  string file_path = 7;             // local path to the artifact
  int64 file_size_bytes = 8;
  string repository_id = 9;         // target repository
}

message RegisterArtifactRequest {
  string build_id = 1;
  ArtifactDescriptor artifact = 2;
}

message RegisterArtifactResponse {
  bool accepted = 1;
}

message RecordUploadResultRequest {
  string artifact_id = 1;
  bool success = 2;
  string error_message = 3;
  int64 upload_duration_ms = 4;
  int64 bytes_transferred = 5;
}

message RecordUploadResultResponse {
  bool accepted = 1;
}

message GetPublishingStatusRequest {
  string build_id = 1;
}

message ArtifactPublishStatus {
  ArtifactDescriptor artifact = 1;
  string status = 2;                // "pending", "uploading", "uploaded", "failed"
  int64 upload_duration_ms = 3;
  string error_message = 4;
}

message GetPublishingStatusResponse {
  repeated ArtifactPublishStatus artifacts = 1;
  int32 total = 2;
  int32 uploaded = 3;
  int32 failed = 4;
  int32 pending = 5;
}

message GetArtifactChecksumsRequest {
  string artifact_id = 1;
}

message GetArtifactChecksumsResponse {
  string md5 = 1;
  string sha1 = 2;
  string sha256 = 3;
}
