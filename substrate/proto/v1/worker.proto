syntax = "proto3";

package gradle.substrate.v1;

option java_multiple_files = true;
option java_package = "gradle.substrate.v1";

service WorkerProcessService {
  rpc AcquireWorker(AcquireWorkerRequest) returns (AcquireWorkerResponse);
  rpc ReleaseWorker(ReleaseWorkerRequest) returns (ReleaseWorkerResponse);
  rpc StopWorker(StopWorkerRequest) returns (StopWorkerResponse);
  rpc GetWorkerStatus(GetWorkerStatusRequest) returns (GetWorkerStatusResponse);
  rpc ConfigurePool(ConfigurePoolRequest) returns (ConfigurePoolResponse);
  rpc RenewLease(RenewLeaseRequest) returns (RenewLeaseResponse);
  rpc SendWork(SendWorkRequest) returns (SendWorkResponse);
}

message WorkerSpec {
  string worker_key = 1;
  string java_home = 2;
  repeated string classpath = 3;
  string working_dir = 4;
  map<string, string> jvm_args = 5;
  int32 max_memory_mb = 6;
  bool daemon = 7;
  string isolation_mode = 8; // "process", "classloader", "app_classloader", "none"
}

message WorkerHandle {
  string worker_id = 1;
  string worker_key = 2;
  int32 pid = 3;
  string connect_address = 4;
  int64 started_at_ms = 5;
  bool healthy = 6;
  int64 lease_expires_at_ms = 7;  // 0 = no lease
  string lease_holder = 8;         // who holds the lease
  string current_work = 9;        // display name of current work item
}

message AcquireWorkerRequest {
  WorkerSpec spec = 1;
  int64 timeout_ms = 2;
}

message AcquireWorkerResponse {
  WorkerHandle worker = 1;
  bool reused = 2;
  string error_message = 3;
}

message ReleaseWorkerRequest {
  string worker_id = 1;
  bool healthy = 2;
}

message ReleaseWorkerResponse { bool accepted = 1; }

message StopWorkerRequest {
  string worker_id = 1;
  bool force = 2;
}

message StopWorkerResponse {
  bool stopped = 1;
  string error_message = 2;
}

message GetWorkerStatusRequest {
  string worker_key = 1;
}

message WorkerStatus {
  string worker_id = 1;
  string worker_key = 2;
  int32 pid = 3;
  string state = 4;
  int64 started_at_ms = 5;
  int64 last_used_ms = 6;
  int64 memory_used_bytes = 7;
  int32 tasks_completed = 8;
  string current_work = 9;
  int64 lease_expires_at_ms = 10;
}

message GetWorkerStatusResponse {
  repeated WorkerStatus workers = 1;
  int32 pool_size = 2;
  int32 idle_count = 3;
  int32 busy_count = 4;
}

message ConfigurePoolRequest {
  int32 max_pool_size = 1;
  int64 idle_timeout_ms = 2;
  int32 max_per_key = 3;
  bool enable_health_checks = 4;
}

message ConfigurePoolResponse { bool applied = 1; }

message RenewLeaseRequest {
  string worker_id = 1;
  int64 duration_ms = 2;
}

message RenewLeaseResponse { bool renewed = 1; }

message SendWorkRequest {
  string worker_id = 1;
  string action_class = 2;
  string parameters_json = 3;
  int64 timeout_ms = 4;
  string display_name = 5;
}

message SendWorkResponse {
  bool accepted = 1;
  string error_message = 2;
}
