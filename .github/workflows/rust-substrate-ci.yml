name: Rust Substrate CI

on:
  push:
    branches: [rust-substrate, master]
    paths:
      - 'substrate/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [rust-substrate, master]
    paths:
      - 'substrate/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    # Run daily at midnight to catch any issues
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  test-linux:
    name: "Test (Linux)"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check compilation
        run: cargo check --verbose

      - name: Clippy (zero warnings required)
        run: cargo clippy -- -D warnings

      - name: Run all unit tests
        run: cargo test --lib --verbose

      - name: Run parser regression tests
        run: cargo test --test parser_regression --verbose

      - name: Run integration tests
        run: cargo test --test integration_test --verbose

      - name: Run differential tests
        run: cargo test --test differential_test --verbose

      - name: Run hash differential tests
        run: cargo test --test differential --verbose

      - name: Run benchmarks
        run: cargo test --test benchmarks --verbose

      - name: Run fuzz tests
        run: cargo test --test parser_fuzz --verbose

  test-macos:
    name: "Test (macOS)"
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check compilation
        run: cargo check --verbose

      - name: Clippy (zero warnings required)
        run: cargo clippy -- -D warnings

      - name: Run all unit tests
        run: cargo test --lib --verbose

      - name: Run full test suite
        run: cargo test --verbose

  release-build:
    name: "Release Build (all platforms)"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: gradle-substrate-daemon-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gradle-substrate-daemon-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: gradle-substrate-daemon-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gradle-substrate-daemon-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} -p gradle-substrate-daemon

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/gradle-substrate-daemon*
          retention-days: 30

      - name: Check binary size (< 10 MB)
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            size=$(du -b target/${{ matrix.target }}/release/gradle-substrate-daemon.exe | cut -f1)
          else
            size=$(du -b target/${{ matrix.target }}/release/gradle-substrate-daemon | cut -f1)
          fi
          echo "Binary size: $size bytes ($(( size / 1024 )) KB)"
          if [ "$size" -gt 10485760 ]; then
            echo "FAIL: Binary exceeds 10 MB limit"
            exit 1
          fi
