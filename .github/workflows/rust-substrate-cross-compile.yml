name: Rust Substrate Cross-Compile

on:
  push:
    branches: [master]
    paths:
      - 'substrate/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [master]
    paths:
      - 'substrate/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get install -y musl-tools
      - run: cargo build -p gradle-substrate-daemon --release --target x86_64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: gradle-substrate-daemon-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/gradle-substrate-daemon

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p gradle-substrate-daemon --release --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: gradle-substrate-daemon-macos-x86_64
          path: target/x86_64-apple-darwin/release/gradle-substrate-daemon

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p gradle-substrate-daemon --release --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: gradle-substrate-daemon-macos-aarch64
          path: target/aarch64-apple-darwin/release/gradle-substrate-daemon

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p gradle-substrate-daemon --release --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: gradle-substrate-daemon-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/gradle-substrate-daemon.exe

  verify-size:
    needs: [build-linux-x86_64, build-macos-x86_64, build-macos-aarch64, build-windows-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          for dir in gradle-substrate-daemon-*; do
            size=$(du -b "$dir"/* | cut -f1)
            echo "$dir: $size bytes ($(( size / 1024 )) KB)"
            if [ "$size" -gt 10485760 ]; then
              echo "FAIL: $dir exceeds 10MB limit"
              exit 1
            fi
          done
