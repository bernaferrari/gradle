schema_version = 1

# Tracks ownership and parity for Rust migration modules.
# Keep paths aligned with upstream module names whenever possible.

[[module]]
id = "platform-core-configuration"
path = "platforms/core-configuration"
owner = "core-configuration"
status = "planned"
upstream_paths = ["platforms/core-configuration"]
last_synced_commit = ""
parity_test_targets = [
  "./gradlew compileAll",
  "./gradlew sanityCheck",
]

[[module]]
id = "platform-core-execution"
path = "platforms/core-execution"
owner = "core-execution"
status = "mixed"
upstream_paths = ["platforms/core-execution"]
last_synced_commit = ""
parity_test_targets = [
  "./tools/stabilization/run_strict_stabilization.sh quick",
  "./gradlew -q :rust-bridge:compileJava :rust-bridge:testClasses",
]

