syntax = "proto3";

package gradle.substrate.v1;

// -- Control Service --

service ControlService {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message HandshakeRequest {
  string client_version = 1;
  string protocol_version = 2;
  int32 client_pid = 3;
}

message HandshakeResponse {
  bool accepted = 1;
  string server_version = 2;
  string protocol_version = 3;
  string error_message = 4;
}

message ShutdownRequest {
  bool force = 1;
}

message ShutdownResponse {
  bool acknowledged = 1;
}

// -- Hash Service --

service HashService {
  rpc HashBatch(HashBatchRequest) returns (HashBatchResponse);
}

message FileToHash {
  string absolute_path = 1;
  int64 length = 2;
  int64 last_modified = 3;
}

message HashResult {
  string absolute_path = 1;
  bytes hash_bytes = 2;
  bool error = 3;
  string error_message = 4;
}

message HashBatchRequest {
  repeated FileToHash files = 1;
  string algorithm = 2;
}

message HashBatchResponse {
  repeated HashResult results = 1;
}

// -- Cache Service --

service CacheService {
  rpc LoadEntry(CacheLoadRequest) returns (stream CacheLoadChunk);
  rpc StoreEntry(stream CacheStoreChunk) returns (CacheStoreResponse);
}

message CacheLoadRequest {
  bytes key = 1;
}

message CacheLoadChunk {
  oneof payload {
    CacheEntryMetadata metadata = 1;
    bytes data = 2;
  }
}

message CacheEntryMetadata {
  int64 size = 1;
  string content_type = 2;
}

message CacheStoreChunk {
  oneof payload {
    CacheStoreInit init = 1;
    bytes data = 2;
  }
}

message CacheStoreInit {
  bytes key = 1;
  int64 total_size = 2;
}

message CacheStoreResponse {
  bool success = 1;
  string error_message = 2;
}

// -- Exec Service --

service ExecService {
  rpc Spawn(ExecSpawnRequest) returns (ExecSpawnResponse);
  rpc Wait(ExecWaitRequest) returns (ExecWaitResponse);
  rpc Signal(ExecSignalRequest) returns (ExecSignalResponse);
  rpc KillTree(ExecKillTreeRequest) returns (ExecKillTreeResponse);
  rpc SubscribeOutput(ExecOutputRequest) returns (stream ExecOutputChunk);
}

message ExecSpawnRequest {
  string command = 1;
  repeated string args = 2;
  map<string, string> environment = 3;
  string working_dir = 4;
  bool redirect_error_stream = 5;
}

message ExecSpawnResponse {
  int32 pid = 1;
  bool success = 2;
  string error_message = 3;
}

message ExecWaitRequest {
  int32 pid = 1;
}

message ExecWaitResponse {
  int32 exit_code = 1;
  string error_message = 2;
}

message ExecSignalRequest {
  int32 pid = 1;
  int32 signal = 2;
}

message ExecSignalResponse {
  bool success = 1;
  string error_message = 2;
}

message ExecKillTreeRequest {
  int32 pid = 1;
}

message ExecKillTreeResponse {
  bool success = 1;
  string error_message = 2;
}

message ExecOutputRequest {
  int32 pid = 1;
}

message ExecOutputChunk {
  bytes data = 1;
  bool is_stderr = 2;
}

// -- Work Service (advisory only) --

service WorkService {
  rpc Evaluate(WorkEvaluateRequest) returns (WorkEvaluateResponse);
  rpc RecordExecution(WorkRecordRequest) returns (WorkRecordResponse);
}

message WorkEvaluateRequest {
  string task_path = 1;
  map<string, string> input_properties = 2;
}

message WorkEvaluateResponse {
  bool should_execute = 1;
  string reason = 2;
}

message WorkRecordRequest {
  string task_path = 1;
  int64 duration_ms = 2;
  bool success = 3;
}

message WorkRecordResponse {
  bool acknowledged = 1;
}

// -- Execution Plan Service --

// Provides advisory and authoritative execution planning.
// Phase 5 (advisory): Rust predicts the outcome, Java remains authoritative.
// Phase 6 (authoritative): Rust drives work identity, caching, and up-to-date decisions.
service ExecutionPlanService {
  // Phase 5: Predict execution outcome without side effects.
  rpc PredictOutcome(PredictOutcomeRequest) returns (PredictOutcomeResponse);

  // Phase 6: Resolve the execution plan authoritatively.
  rpc ResolvePlan(ResolvePlanRequest) returns (ResolvePlanResponse);

  // Record the actual outcome after execution (for shadow mode comparison).
  rpc RecordOutcome(RecordOutcomeRequest) returns (RecordOutcomeResponse);
}

// Metadata about a unit of work sent from the JVM.
message WorkMetadata {
  // Unique identity string for the work unit.
  string work_identity = 1;
  // Display name (e.g. task path).
  string display_name = 2;
  // Implementation class name.
  string implementation_class = 3;
  // All scalar input properties (name -> serialized value snapshot).
  map<string, string> input_properties = 4;
  // All input file fingerprints (name -> fingerprint hash).
  map<string, string> input_file_fingerprints = 5;
  // Whether caching is enabled for this work.
  bool caching_enabled = 6;
  // Whether loading from cache is allowed.
  bool can_load_from_cache = 7;
  // Whether the work has previous execution state.
  bool has_previous_execution_state = 8;
  // Rebuild reasons if the work needs re-execution.
  repeated string rebuild_reasons = 9;
}

enum PredictedOutcome {
  PREDICTED_UNKNOWN = 0;
  PREDICTED_EXECUTE = 1;
  PREDICTED_UP_TO_DATE = 2;
  PREDICTED_FROM_CACHE = 3;
  PREDICTED_SHORT_CIRCUITED = 4;
}

message PredictOutcomeRequest {
  WorkMetadata work = 1;
}

message PredictOutcomeResponse {
  PredictedOutcome predicted_outcome = 1;
  string reasoning = 2;
  // Confidence score 0.0-1.0 for the prediction.
  float confidence = 3;
}

// Authoritative plan resolution for Phase 6.
enum PlanAction {
  PLAN_ACTION_UNKNOWN = 0;
  PLAN_ACTION_EXECUTE = 1;
  PLAN_ACTION_SKIP_UP_TO_DATE = 2;
  PLAN_ACTION_LOAD_FROM_CACHE = 3;
  PLAN_ACTION_SHORT_CIRCUIT = 4;
}

message ResolvePlanRequest {
  WorkMetadata work = 1;
  // Mode: advisory (shadow) or authoritative.
  bool authoritative = 2;
}

message ResolvePlanResponse {
  PlanAction action = 1;
  string reasoning = 2;
  // Cache key to use if action is LOAD_FROM_CACHE.
  string cache_key_hint = 3;
}

message RecordOutcomeRequest {
  string work_identity = 1;
  PredictedOutcome predicted_outcome = 2;
  string actual_outcome = 3;
  bool prediction_correct = 4;
  int64 duration_ms = 5;
}

message RecordOutcomeResponse {
  bool acknowledged = 1;
}

// -- Execution History Service (Phase 7) --

// Stores and retrieves execution history for up-to-date checking.
// Replaces Java's ExecutionHistoryStore with Rust-backed storage.
service ExecutionHistoryService {
  // Load previous execution state for a work unit.
  rpc LoadHistory(LoadHistoryRequest) returns (LoadHistoryResponse);
  // Store execution state after execution completes.
  rpc StoreHistory(StoreHistoryRequest) returns (StoreHistoryResponse);
  // Remove execution history for a work unit.
  rpc RemoveHistory(RemoveHistoryRequest) returns (RemoveHistoryResponse);
}

message LoadHistoryRequest {
  string work_identity = 1;
}

message LoadHistoryResponse {
  bool found = 1;
  // Serialized execution state (input fingerprints, output snapshots, etc.).
  bytes state = 2;
  // Timestamp of when this state was stored.
  int64 timestamp_ms = 3;
}

message StoreHistoryRequest {
  string work_identity = 1;
  // Serialized execution state.
  bytes state = 2;
  int64 timestamp_ms = 3;
}

message StoreHistoryResponse {
  bool success = 1;
}

message RemoveHistoryRequest {
  string work_identity = 1;
}

message RemoveHistoryResponse {
  bool success = 1;
}

// -- File Fingerprint Service (Phase 9) --

// Walks file trees and computes content hashes in Rust.
// Replaces Java's FileCollectionFingerprinter.
service FileFingerprintService {
  // Fingerprint a set of files/directories.
  rpc FingerprintFiles(FingerprintFilesRequest) returns (FingerprintFilesResponse);
}

message FileToFingerprint {
  string absolute_path = 1;
  // How to handle this entry: FILE, DIRECTORY, or ROOT.
  FingerprintType type = 2;
}

enum FingerprintType {
  FINGERPRINT_FILE = 0;
  FINGERPRINT_DIRECTORY = 1;
  FINGERPRINT_ROOT = 2;
}

message FingerprintFilesRequest {
  repeated FileToFingerprint files = 1;
  // Normalization strategy: ABSOLUTE_PATH, RELATIVE_PATH, NAME_ONLY, HASH.
  string normalization_strategy = 2;
  // Ignore changes to this pattern (e.g. ".DS_Store").
  repeated string ignore_patterns = 3;
}

message FileFingerprintEntry {
  string path = 1;
  bytes hash = 2;
  int64 size = 3;
  int64 last_modified = 4;
  bool is_directory = 5;
}

message FingerprintFilesResponse {
  // Fingerprinted entries.
  repeated FileFingerprintEntry entries = 1;
  // Overall hash of the entire file collection.
  bytes collection_hash = 2;
  // Error message if fingerprinting failed.
  string error_message = 3;
  bool success = 4;
}

// -- Value Snapshot Service (Phase 10) --

// Computes fingerprints for input properties in Rust.
// Replaces Java's DefaultValueSnapshotter.
service ValueSnapshotService {
  // Fingerprint a batch of input properties.
  rpc SnapshotValues(SnapshotValuesRequest) returns (SnapshotValuesResponse);
}

message PropertyValue {
  string name = 1;
  // Serialized value representation.
  oneof value {
    string string_value = 2;
    int64 long_value = 3;
    bool bool_value = 4;
    bytes binary_value = 5;
    // For collection types, a semicolon-separated list.
    string list_value = 6;
    // For map types, key=value pairs separated by newlines.
    string map_value = 7;
  }
  // Type name for the value (e.g. "java.lang.String", "java.io.File").
  string type_name = 8;
}

message SnapshotValuesRequest {
  repeated PropertyValue values = 1;
  // Implementation fingerprint for the work unit.
  string implementation_fingerprint = 2;
}

message ValueSnapshotResult {
  string name = 1;
  bytes fingerprint = 2;
}

message SnapshotValuesResponse {
  repeated ValueSnapshotResult results = 1;
  // Composite hash of all input values.
  bytes composite_hash = 2;
  // Error message if snapshotting failed.
  string error_message = 3;
  bool success = 4;
}

// -- Build Cache Orchestration Service (Phase 8) --

// Coordinates build cache operations from Rust.
// Replaces Java's BuildCacheController with Rust-backed orchestration.
service BuildCacheOrchestrationService {
  // Compute a cache key for the given work identity and input fingerprints.
  rpc ComputeCacheKey(ComputeCacheKeyRequest) returns (ComputeCacheKeyResponse);
  // Check if a cache entry exists without loading it.
  rpc ProbeCache(ProbeCacheRequest) returns (ProbeCacheResponse);
  // Pack execution outputs into a cache entry (delegates to existing CacheService).
  rpc StoreOutputs(StoreOutputsRequest) returns (StoreOutputsResponse);
}

message ComputeCacheKeyRequest {
  string work_identity = 1;
  string implementation_hash = 2;
  map<string, string> input_property_hashes = 3;
  map<string, string> input_file_hashes = 4;
  repeated string output_property_names = 5;
}

message ComputeCacheKeyResponse {
  bytes cache_key = 1;
  string cache_key_string = 2;
}

message ProbeCacheRequest {
  bytes cache_key = 1;
}

message ProbeCacheResponse {
  bool available = 1;
  string location = 2; // "local", "remote", or "both"
}

message StoreOutputsRequest {
  bytes cache_key = 1;
  int64 execution_time_ms = 2;
}

message StoreOutputsResponse {
  bool success = 1;
  string error_message = 2;
}
