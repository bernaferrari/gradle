syntax = "proto3";

package gradle.substrate.v1;

option java_multiple_files = true;
option java_package = "gradle.substrate.v1";

service ParserService {
  // Parse a Groovy DSL script into an AST
  rpc ParseGroovy(ParseGroovyRequest) returns (ParseGroovyResponse);

  // Parse a Gradle build script and extract all elements
  rpc ParseBuildScript(ParseBuildScriptRequest) returns (ParseBuildScriptResponse);

  // Extract dependency declarations from a build script
  rpc ParseBuildScriptDependencies(ParseBuildScriptDependenciesRequest) returns (ParseBuildScriptDependenciesResponse);

  // Extract plugin declarations from a build script
  rpc ParseBuildScriptPlugins(ParseBuildScriptPluginsRequest) returns (ParseBuildScriptPluginsResponse);

  // Extract repository declarations from a build script
  rpc ParseBuildScriptRepositories(ParseBuildScriptRepositoriesRequest) returns (ParseBuildScriptRepositoriesResponse);

  // Extract task definitions from a build script
  rpc ParseBuildScriptTasks(ParseBuildScriptTasksRequest) returns (ParseBuildScriptTasksResponse);

  // Extract source set declarations from a build script
  rpc ParseBuildScriptSourceSets(ParseBuildScriptSourceSetsRequest) returns (ParseBuildScriptSourceSetsResponse);

  // Parse a build script and return strongly-typed IR
  rpc ParseBuildScriptTyped(ParseBuildScriptTypedRequest) returns (ParseBuildScriptTypedResponse);
}

// --- Groovy AST ---

message ParseGroovyRequest {
  string script_content = 1;
  string file_path = 2;
  Dialect dialect = 3;
}

enum Dialect {
  GROOVY = 0;
  KOTLIN_DSL = 1;
}

message ParseGroovyResponse {
  repeated GroovyNode nodes = 1;
  int32 error_count = 2;
  string error_message = 3;
}

message GroovyNode {
  string node_type = 1;
  string text = 2;
  int32 line = 3;
  int32 column = 4;
  repeated GroovyNode children = 5;
  map<string, string> properties = 6;
}

// --- Build Script Parsing ---

message ParseBuildScriptRequest {
  string script_content = 1;
  string file_path = 2;
}

message ParseBuildScriptResponse {
  repeated BuildScriptElement elements = 1;
  int32 error_count = 2;
}

message BuildScriptElement {
  string element_type = 1;
  map<string, string> properties = 2;
  string raw_text = 3;
  int32 line = 4;
}

// --- Dependency Parsing ---

message ParseBuildScriptDependenciesRequest {
  string script_content = 1;
  string configuration_name = 2;
}

message ParseBuildScriptDependenciesResponse {
  repeated DependencyEntry dependencies = 1;
}

message DependencyEntry {
  string group = 1;
  string artifact = 2;
  string version = 3;
  string configuration = 4;
  string raw_text = 5;
  bool is_project = 6;
}

// --- Plugin Parsing ---

message ParseBuildScriptPluginsRequest {
  string script_content = 1;
  string block_type = 2;
}

message ParseBuildScriptPluginsResponse {
  repeated PluginEntry plugins = 1;
}

message PluginEntry {
  string id = 1;
  string version = 2;
  bool apply = 3;
  string raw_text = 4;
  int32 line = 5;
}

// --- Repository Parsing ---

message ParseBuildScriptRepositoriesRequest {
  string script_content = 1;
}

message ParseBuildScriptRepositoriesResponse {
  repeated RepositoryEntry repositories = 1;
}

message RepositoryEntry {
  string name = 1;
  string url = 2;
  string type = 3;
  string raw_text = 4;
}

// --- Task Parsing ---

message ParseBuildScriptTasksRequest {
  string script_content = 1;
}

message ParseBuildScriptTasksResponse {
  repeated TaskEntry tasks = 1;
}

message TaskEntry {
  string name = 1;
  string type = 2;
  repeated string depends_on = 3;
  map<string, string> properties = 4;
  string raw_text = 5;
  int32 line = 6;
}

// --- Source Set Parsing ---

message ParseBuildScriptSourceSetsRequest {
  string script_content = 1;
}

message ParseBuildScriptSourceSetsResponse {
  repeated SourceSetEntry source_sets = 1;
}

message SourceSetEntry {
  string name = 1;
  repeated string src_dirs = 2;
  repeated string resource_dirs = 3;
}

// --- Typed Build Script IR ---

message ParseBuildScriptTypedRequest {
  string script_content = 1;
  string file_path = 2;
}

message ParseBuildScriptTypedResponse {
  ScriptType script_type = 1;
  repeated TypedPlugin plugins = 2;
  repeated TypedDependency dependencies = 3;
  repeated TypedVersionCatalogRef catalog_refs = 4;
  repeated TypedBuildScriptDep buildscript_deps = 5;
  repeated TypedTaskConfig task_configs = 6;
  repeated TypedRepository repositories = 7;
  repeated TypedSubproject subprojects = 8;
  TypedPluginManagement plugin_management = 9;
  TypedDependencyResolutionManagement dependency_resolution_management = 10;
  string source_compatibility = 11;
  string target_compatibility = 12;
  string group = 13;
  string version = 14;
  repeated string warnings = 15;
}

enum ScriptType {
  UNKNOWN_SCRIPT = 0;
  KOTLIN_DSL_SCRIPT = 1;
  GROOVY_SCRIPT = 2;
}

message TypedPlugin {
  string id = 1;
  bool apply = 2;
  string version = 3;
  int32 line = 4;
}

message TypedDependency {
  string configuration = 1;
  string notation = 2;
  int32 line = 3;
}

message TypedVersionCatalogRef {
  string configuration = 1;
  string alias = 2;
}

message TypedBuildScriptDep {
  string notation = 1;
}

message TypedTaskConfig {
  string task_name = 1;
  repeated string depends_on = 2;
  repeated string should_run_after = 3;
  bool enabled = 4;
  int32 line = 5;
}

message TypedRepository {
  string name = 1;
  string repo_type = 2;
}

message TypedSubproject {
  string path = 1;
}

message TypedPluginManagement {
  repeated TypedRepository repositories = 1;
}

message TypedDependencyResolutionManagement {
  string repositories_mode = 1;
  repeated TypedRepository repositories = 2;
}
