syntax = "proto3";

package gradle.substrate.v1;

option java_multiple_files = true;
option java_package = "gradle.substrate.v1";

service BuildOperationsService {
  rpc StartOperation(StartOperationRequest) returns (StartOperationResponse);
  rpc CompleteOperation(CompleteOperationRequest) returns (CompleteOperationResponse);
  rpc ReportProgress(ReportProgressRequest) returns (ReportProgressResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream BuildEvent);
  rpc GetBuildSummary(GetBuildSummaryRequest) returns (GetBuildSummaryResponse);
  rpc GetOperationDetails(GetOperationDetailsRequest) returns (GetOperationDetailsResponse);
}

message StartOperationRequest {
  string build_id = 7;
  string operation_id = 1;
  string display_name = 2;
  string operation_type = 3;
  string parent_id = 4;
  int64 start_time_ms = 5;
  map<string, string> metadata = 6;
}
message StartOperationResponse { bool success = 1; }
message CompleteOperationRequest {
  string build_id = 5;
  string operation_id = 1;
  int64 duration_ms = 2;
  bool success = 3;
  string outcome = 4;
}
message CompleteOperationResponse {
  bool success = 1;
  optional string display_name = 2;
  optional string operation_type = 3;
  int64 duration_ms = 4;
}
message OperationDetail {
  string operation_id = 1;
  optional string display_name = 2;
  optional string operation_type = 3;
  optional string parent_id = 4;
  int64 start_time_ms = 5;
  int64 duration_ms = 6;
  bool success = 7;
  map<string, string> metadata = 8;
}
message GetOperationDetailsRequest {
  string build_id = 2;
  string operation_id = 1;
}
message GetOperationDetailsResponse {
  optional OperationDetail detail = 1;
}
message ReportProgressRequest {
  string build_id = 5;
  string operation_id = 1;
  string message = 2;
  float progress = 3;
  int64 elapsed_ms = 4;
}
message ReportProgressResponse { bool acknowledged = 1; }
message StreamEventsRequest { string build_id = 1; }
message BuildEvent {
  int64 timestamp_ms = 1;
  string event_type = 2;
  string operation_id = 3;
  string display_name = 4;
  string message = 5;
  float progress = 6;
  bool success = 7;
}
message GetBuildSummaryRequest { string build_id = 1; }
message BuildSummary {
  string build_id = 1;
  int64 total_duration_ms = 2;
  int32 total_tasks = 3;
  int32 executed_tasks = 4;
  int32 up_to_date_tasks = 5;
  int32 from_cache_tasks = 6;
  int32 failed_tasks = 7;
  string outcome = 8;
  int32 total_operations = 9;
  int64 total_operation_duration_ms = 10;
  map<string, int32> operations_by_type = 11;
  repeated OperationDetail completed_operations = 12;
}
message GetBuildSummaryResponse {
  BuildSummary summary = 1;
}

service BuildEventStreamService {
  rpc SubscribeBuildEvents(SubscribeBuildEventsRequest) returns (stream BuildEventMessage);
  rpc SendBuildEvent(SendBuildEventRequest) returns (SendBuildEventResponse);
  rpc GetEventLog(GetEventLogRequest) returns (GetEventLogResponse);
}
message SubscribeBuildEventsRequest {
  string build_id = 1;
  repeated string event_types = 2;
}
message BuildEventMessage {
  string build_id = 1;
  int64 timestamp_ms = 2;
  string event_type = 3;
  string event_id = 4;
  map<string, string> properties = 5;
  string display_name = 6;
  string parent_id = 7;
}
message SendBuildEventRequest {
  string build_id = 1;
  string event_type = 2;
  string event_id = 3;
  map<string, string> properties = 4;
  string display_name = 5;
  string parent_id = 6;
}
message SendBuildEventResponse { bool accepted = 1; }
message GetEventLogRequest {
  string build_id = 1;
  int64 since_timestamp_ms = 2;
  int32 max_events = 3;
  repeated string event_types = 4;
}
message GetEventLogResponse {
  repeated BuildEventMessage events = 1;
  int32 total_events = 2;
}

service BuildResultService {
  rpc ReportTaskResult(ReportTaskResultRequest) returns (ReportTaskResultResponse);
  rpc ReportBuildFailure(ReportBuildFailureRequest) returns (ReportBuildFailureResponse);
  rpc GetBuildResult(GetBuildResultRequest) returns (GetBuildResultResponse);
  rpc GetTaskSummary(GetTaskSummaryRequest) returns (GetTaskSummaryResponse);
}
message TaskResult {
  string task_path = 1;
  string outcome = 2;
  int64 duration_ms = 3;
  bool did_work = 4;
  string cache_key = 5;
  int64 start_time_ms = 6;
  int64 end_time_ms = 7;
  string failure_message = 8;
  int32 execution_reason = 9;
}
message ReportTaskResultRequest {
  string build_id = 1;
  TaskResult result = 2;
}
message ReportTaskResultResponse { bool accepted = 1; }
message ReportBuildFailureRequest {
  string build_id = 1;
  string failure_type = 2;
  string failure_message = 3;
  repeated string failed_task_paths = 4;
}
message ReportBuildFailureResponse { bool accepted = 1; }
message BuildOutcome {
  string build_id = 1;
  string overall_result = 2;
  int64 total_duration_ms = 3;
  int32 tasks_total = 4;
  int32 tasks_executed = 5;
  int32 tasks_from_cache = 6;
  int32 tasks_up_to_date = 7;
  int32 tasks_failed = 8;
  int32 tasks_skipped = 9;
  optional string failure_type = 10;
  optional string failure_message = 11;
  repeated string failed_task_paths = 12;
}
message GetBuildResultRequest { string build_id = 1; }
message GetBuildResultResponse {
  BuildOutcome outcome = 1;
  repeated TaskResult task_results = 2;
}
message GetTaskSummaryRequest { string build_id = 1; }
message TaskSummaryEntry {
  string task_path = 1;
  string outcome = 2;
  int64 duration_ms = 3;
}
message GetTaskSummaryResponse {
  repeated TaskSummaryEntry tasks = 1;
  int64 total_duration_ms = 2;
}
