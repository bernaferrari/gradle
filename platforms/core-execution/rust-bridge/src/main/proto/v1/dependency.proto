syntax = "proto3";

package gradle.substrate.v1;

option java_multiple_files = true;
option java_package = "gradle.substrate.v1";

import "v1/configuration.proto";

service DependencyResolutionService {
  rpc ResolveDependencies(ResolveDependenciesRequest) returns (ResolveDependenciesResponse);
  rpc CheckArtifactCache(CheckArtifactCacheRequest) returns (CheckArtifactCacheResponse);
  rpc DownloadArtifact(DownloadArtifactRequest) returns (stream DownloadArtifactChunk);
  rpc RecordResolution(RecordResolutionRequest) returns (RecordResolutionResponse);
  rpc GetResolutionStats(GetResolutionStatsRequest) returns (GetResolutionStatsResponse);
  rpc AddArtifactToCache(AddArtifactToCacheRequest) returns (AddArtifactToCacheResponse);
  rpc VerifyDependencyChecksums(VerifyDependencyChecksumsRequest) returns (VerifyDependencyChecksumsResponse);
}

message DependencyDescriptor {
  string group = 1;
  string name = 2;
  string version = 3;
  string classifier = 4;
  string extension = 5;
  bool transitive = 6;
  // Dependency scope: "compile", "runtime", "test", "provided", "system".
  string scope = 7;
  bool changing = 8;
  bool optional = 9;
  // Ivy conf mapping (e.g., "compile->default(compile)").
  string ivy_conf = 10;
}

message RepositoryDescriptor {
  string id = 1;
  string url = 2;
  bool m2compatible = 3;
  bool allow_insecure_protocol = 4;
  map<string, string> credentials = 5;
  // Repository layout: "maven" (default) or "ivy".
  string layout = 6;
  // Ivy artifact pattern (e.g., "[organisation]/[module]/[revision]/[type]s/[artifact]-[revision].[ext]").
  string ivy_pattern = 7;
}

message ResolveDependenciesRequest {
  string configuration_name = 1;
  repeated DependencyDescriptor dependencies = 2;
  repeated RepositoryDescriptor repositories = 3;
  repeated string attributes = 4;
  bool lenient = 5;
  // Resolution strategy configuration.
  ResolutionStrategyConfig resolution_strategy = 6;
  // Target scope for resolution (e.g., "compile", "runtime").
  string target_scope = 7;
}

message ResolvedDependency {
  string group = 1;
  string name = 2;
  string version = 3;
  string selected_version = 4;
  repeated ResolvedDependency dependencies = 5;
  bool resolved = 6;
  string failure_reason = 7;
  string artifact_url = 8;
  int64 artifact_size = 9;
  string artifact_sha256 = 10;
  // Resolved scope.
  string scope = 11;
}

message ResolveDependenciesResponse {
  bool success = 1;
  repeated ResolvedDependency resolved_dependencies = 2;
  string error_message = 3;
  int64 resolution_time_ms = 4;
  int32 total_artifacts = 5;
  int64 total_download_size = 6;
}

message CheckArtifactCacheRequest {
  string group = 1;
  string name = 2;
  string version = 3;
  string classifier = 4;
  string extension = 5;
  string sha256 = 6;
}

message CheckArtifactCacheResponse {
  bool cached = 1;
  string local_path = 2;
  int64 cached_size = 3;
}

message DownloadArtifactRequest {
  string url = 1;
  string group = 2;
  string name = 3;
  string version = 4;
  string classifier = 5;
  string extension = 6;
  repeated RepositoryDescriptor repositories = 7;
}

message DownloadArtifactChunk {
  bytes data = 1;
  int64 offset = 2;
  int64 total_size = 3;
  bool is_last = 4;
  string error_message = 5;
}

message RecordResolutionRequest {
  string configuration_name = 1;
  int32 dependency_count = 2;
  int64 resolution_time_ms = 3;
  bool success = 4;
  int64 cache_hits = 5;
}

message RecordResolutionResponse { bool acknowledged = 1; }

message GetResolutionStatsRequest {}

message GetResolutionStatsResponse {
  int64 total_resolutions = 1;
  int64 artifact_cache_hits = 2;
  int64 total_resolution_time_ms = 3;
  double avg_resolution_time_ms = 4;
  int64 cached_artifacts = 5;
}

message AddArtifactToCacheRequest {
  string group = 1;
  string name = 2;
  string version = 3;
  string classifier = 4;
  string local_path = 5;
  int64 size = 6;
  string sha256 = 7;
}

message AddArtifactToCacheResponse { bool accepted = 1; }

// --- Resolution strategy ---

message ResolutionStrategyConfig {
  // Strategy: "highest_version", "force", "prefer", "fail_on_conflict", "nearest".
  string strategy = 1;
  // Forced versions: group:name -> version.
  repeated StringEntry forced_versions = 2;
  // Preferred versions: group:name -> version.
  repeated StringEntry preferred_versions = 3;
}

// --- Dependency verification ---

message VerifyDependencyChecksumsRequest {
  repeated ChecksumEntry entries = 1;
  // If true, reject the entire request on any mismatch.
  bool strict = 2;
}

message VerifyDependencyChecksumsResponse {
  bool all_matched = 1;
  repeated ChecksumFailure failures = 2;
}

message ChecksumEntry {
  string group = 1;
  string name = 2;
  string version = 3;
  string classifier = 4;
  string expected_sha256 = 5;
  string actual_sha256 = 6;
}

message ChecksumFailure {
  string group = 1;
  string name = 2;
  string version = 3;
  string expected_sha256 = 4;
  string actual_sha256 = 5;
}
