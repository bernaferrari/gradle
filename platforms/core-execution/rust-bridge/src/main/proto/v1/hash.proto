syntax = "proto3";

package gradle.substrate.v1;

option java_multiple_files = true;
option java_package = "gradle.substrate.v1";

service HashService {
  rpc HashBatch(HashBatchRequest) returns (HashBatchResponse);
}

message FileToHash {
  string absolute_path = 1;
  int64 length = 2;
  int64 last_modified = 3;
}
message HashResult {
  string absolute_path = 1;
  bytes hash_bytes = 2;
  bool error = 3;
  string error_message = 4;
}
message HashBatchRequest {
  repeated FileToHash files = 1;
  string algorithm = 2;
}
message HashBatchResponse {
  repeated HashResult results = 1;
}
